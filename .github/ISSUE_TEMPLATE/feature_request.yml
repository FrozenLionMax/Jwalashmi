name: Feature Request
description: Suggest a new feature for JWALASHMI
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: We'd love to hear your ideas for improving JWALASHMI!
  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What would you like to see added?
      placeholder: Describe the feature
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important?
      placeholder: How would this help with solar flare prediction or space weather monitoring?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Dashboard UI
        - ML Model
        - Data Pipeline
        - API
        - Documentation
        - Other
    validations:
      required: true
